# Stack for the GCP VM. Copy to docker-compose.yml and set your subdomain.
# Just two containers: n8n (intake engine) + Caddy (automatic HTTPS).
#
# The database is Supabase (managed) and the frontend is Vercel — neither
# runs here. n8n keeps its OWN workflows/credentials in a local SQLite file
# inside the n8n_data volume (no external DB needed for n8n itself); the
# Supabase Postgres connection is a *credential inside n8n* that the
# workflows use to write submissions — see deploy/README.md step 4.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped                              # survives reboots — no laptop needs to stay open
    environment:
      - N8N_HOST=YOUR_SUBDOMAIN.duckdns.org              # e.g. awaaz.duckdns.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://YOUR_SUBDOMAIN.duckdns.org/  # webhook URLs generate from this — set it right BEFORE registering Telegram/WhatsApp webhooks
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
