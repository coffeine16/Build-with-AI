# Production stack for the EC2 box. Copy to docker-compose.yml and fill values.
# Postgres lives in Supabase (managed) — nothing DB-related runs here.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # n8n stores its own workflows/credentials in Supabase Postgres (same as Haq)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=YOUR_SUPABASE_POOLER_HOST     # e.g. aws-1-ap-south-1.pooler.supabase.com
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=postgres
      - DB_POSTGRESDB_USER=postgres.YOUR_SUPABASE_PROJECT_REF
      - DB_POSTGRESDB_PASSWORD=YOUR_SUPABASE_PASSWORD
      - N8N_HOST=YOUR_DUCKDNS_SUBDOMAIN                  # e.g. awaaz.duckdns.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://YOUR_DUCKDNS_SUBDOMAIN/      # webhook URLs generate from this — must be right BEFORE setting Telegram/WhatsApp webhooks
      - N8N_SECURE_COOKIE=false
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

  pipeline:
    build: ./pipeline
    container_name: pipeline
    restart: unless-stopped                              # <- the "no laptop running" guarantee
    environment:
      - DATABASE_URL=postgresql://postgres.YOUR_REF:YOUR_PASSWORD@YOUR_SUPABASE_POOLER_HOST:5432/postgres
      - GEMINI_API_KEY=YOUR_GEMINI_KEY
      - PIPELINE_INTERVAL=300                            # seconds between recomputes; drop to 120 for the demo window

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
